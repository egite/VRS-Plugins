<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Snap to Ownship - Web Admin</title>
        @head.html@
        <!-- [[ BUNDLE END ]] -->
        <script src="script/Strings.js"></script>
        <script src="script/Strings.Server.js"></script>
        <script src="script/bootstrap-helper.js"></script>
        <script src="SnapToOwnshipPluginOptions.js"></script>
    </head>
    <body>
        <div id="page-container">
            <div id="content" class="container-fluid">
                <div class="row row-offcanvas row-offcanvas-left">
                    <div class="col-xs-12 col-sm-9">
                        <h1 class="page-header">Snap to Ownship</h1>

                        <div id="failure-message" class="alert alert-danger"></div>

                        <div class="form-horizontal">

                            <div class="panel panel-default">
                                <div class="panel-heading"><strong>General</strong></div>
                                <div class="panel-body">
                                    <div class="form-group">
                                        <div class="col-sm-offset-3 col-sm-9 checkbox">
                                            <label><input type="checkbox" data-bind="checked: Enabled" /> Enabled</label>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="col-sm-3 control-label">Ownship ICAO Address</label>
                                        <div class="col-sm-3">
                                            <input type="text" class="form-control" maxlength="6" style="text-transform:uppercase;" data-bind="value: OwnshipIcao" placeholder="e.g. A12345" />
                                        </div>
                                        <div class="col-sm-6">
                                            <p class="form-control-static text-muted">The 6-character hex ICAO address of your aircraft.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <hr />

                        <div class="row">
                            <div class="col-sm-2">
                                <button type="button" class="btn btn-info" data-bind="click: $.proxy(pageHandler.save, pageHandler)">
                                    Save
                                </button>
                            </div>
                            <div class="col-sm-10" data-bind="visible: SaveAttempted">
                                <div class="alert alert-success">
                                    <span data-bind="text: SavedMessage"></span>
                                </div>
                            </div>
                        </div>

                        <hr />

                        <p class="text-muted small">
                            <strong>About this plugin:</strong>
                            Automatically re-centres the VRS map on your ownship's current location
                            at a configurable interval, so the map view follows you. Pairs well with
                            the Stratux GPS plugin.
                        </p>

                    </div>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            $(document).on('ready', function () {
                Bootstrap.Helper.decorateBootstrapElements();
                window.pageHandler = new VRS.WebAdmin.SnapToOwnshipPluginOptions.PageHandler();
            })
        </script>
    </body>
</html>
