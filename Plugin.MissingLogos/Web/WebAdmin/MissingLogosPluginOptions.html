<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Missing Logos - Web Admin</title>
        @head.html@
        <!-- [[ BUNDLE END ]] -->
        <script src="script/Strings.js"></script>
        <script src="script/Strings.Server.js"></script>
        <script src="script/bootstrap-helper.js"></script>
        <script src="MissingLogosPluginOptions.js"></script>
    </head>
    <body>
        <div id="page-container">
            <div id="content" class="container-fluid">
                <div class="row row-offcanvas row-offcanvas-left">
                    <div class="col-xs-12 col-sm-9">
                        <h1 class="page-header">Missing Logos</h1>

                        <div id="failure-message" class="alert alert-danger"></div>

                        <div class="form-horizontal">

                            <!-- General Settings -->
                            <div class="panel panel-default">
                                <div class="panel-heading"><strong>General</strong></div>
                                <div class="panel-body">
                                    <div class="form-group">
                                        <div class="col-sm-offset-3 col-sm-9 checkbox">
                                            <label><input type="checkbox" data-bind="checked: Enabled" /> Enabled</label>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="col-sm-3 control-label">Log file path</label>
                                        <div class="col-sm-9">
                                            <input type="text" class="form-control" data-bind="value: LogFileName" placeholder="Default" />
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <div class="col-sm-offset-3 col-sm-9 checkbox">
                                            <label><input type="checkbox" data-bind="checked: TrackMissingModels" /> Track missing models</label>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="col-sm-3 control-label">Model log file path</label>
                                        <div class="col-sm-9">
                                            <input type="text" class="form-control" data-bind="value: ModelLogFileName" placeholder="Default" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Missing Logos Log -->
                            <div class="panel panel-default">
                                <div class="panel-heading">
                                    <strong>Missing Logos Log</strong>
                                    <button type="button" class="btn btn-xs btn-default pull-right" data-bind="click: $.proxy(pageHandler.refreshLogs, pageHandler)">Refresh</button>
                                </div>
                                <div class="panel-body">
                                    <textarea class="form-control" rows="10" readonly style="font-family:monospace;font-size:0.85em;background:#f8f8f8;" data-bind="value: LogContents"></textarea>
                                </div>
                            </div>

                            <!-- Missing Models Log -->
                            <div class="panel panel-default">
                                <div class="panel-heading">
                                    <strong>Missing Models Log</strong>
                                    <button type="button" class="btn btn-xs btn-default pull-right" data-bind="click: $.proxy(pageHandler.refreshLogs, pageHandler)">Refresh</button>
                                </div>
                                <div class="panel-body">
                                    <textarea class="form-control" rows="10" readonly style="font-family:monospace;font-size:0.85em;background:#f8f8f8;" data-bind="value: ModelLogContents"></textarea>
                                </div>
                            </div>

                        </div>

                        <hr />

                        <div class="row">
                            <div class="col-sm-2">
                                <button type="button" class="btn btn-info" data-bind="click: $.proxy(pageHandler.save, pageHandler)">
                                    Save
                                </button>
                            </div>
                            <div class="col-sm-10" data-bind="visible: SaveAttempted">
                                <div class="alert alert-success">
                                    <span data-bind="text: SavedMessage"></span>
                                </div>
                            </div>
                        </div>

                        <hr />

                        <p class="text-muted small">
                            <strong>About this plugin:</strong>
                            Logs every aircraft seen for which no operator logo could be matched,
                            writing the entries to the file specified above. Useful for identifying
                            which logos still need to be added to your VRS logos folder.
                        </p>

                    </div>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            $(document).on('ready', function () {
                Bootstrap.Helper.decorateBootstrapElements();
                window.pageHandler = new VRS.WebAdmin.MissingLogosPluginOptions.PageHandler();
            })
        </script>
    </body>
</html>
